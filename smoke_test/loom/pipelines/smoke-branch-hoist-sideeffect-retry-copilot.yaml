pipeline: smoke-branch-hoist-sideeffect-retry-copilot
cli: copilot
default_extra_args: ['--model', 'gpt-4.1']
inputs: [topic]

# Copilot-CLI variant of smoke-branch-hoist-sideeffect-retry-claude.yaml.

flow:
  - step: ac-writer
    input: $topic
    produces: DRAFT.md
    bind: writerOut

  - branch:
      bind: branchPoint
      when: writerOut.length > 0
      then:
        - step: spec-writer
          input: $writerOut

  - step: ac-reviewer
    input: $writerOut
    produces: review.json
    bind: rev

  - aggregate:
      inputs:
        r: $rev
      verdict_field: status
      approve_when: pass
      bind: overall
      retry_from: branchPoint
      max_retries: 1
      revise_with:
        prompt: 'Reconsider and revise the draft based on reviewer feedback.'
