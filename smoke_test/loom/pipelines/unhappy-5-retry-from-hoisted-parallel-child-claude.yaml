# Expected failure: retry_from='acs' targets a hoisted parallel-child bind.
# Parallel children have no ordering — "retry from one child" is undefined in v0.1.x.
# Workaround: target the parallel block's own bind to rerun the whole parallel
# (which is itself rejected in v0.1.x — see unhappy-6).
pipeline: unhappy-5-retry-from-hoisted-parallel-child-claude
cli: claude
default_extra_args: ['--model', 'haiku']
inputs: [topic]
flow:
  - parallel:
      - step: ac-writer
        input: $topic
        produces: ACS.md
        bind: acs
      - step: spec-writer
        input: $topic
        produces: SPEC.md
        bind: spec
  - step: ac-reviewer
    input: $acs
    produces: gate.json
    bind: gate
    on_fail:
      verdict_field: status
      retry_from: acs
      revise_with:
        prompt: 'Revise per findings.'
