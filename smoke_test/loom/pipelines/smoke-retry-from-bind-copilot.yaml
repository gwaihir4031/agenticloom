pipeline: smoke-retry-from-bind-copilot
cli: copilot
default_extra_args: ['--model', 'gpt-4.1']
inputs: [topic]

# Copilot-CLI variant of smoke-retry-from-bind-claude.yaml. Same
# semantics, different shell-out target (`copilot -p` instead of
# `claude -p`). Agents resolve from `.github/agents/` (project) then
# `~/.copilot/agents/` (global). The `cli:` field is the only meaningful
# difference from the claude variant.

flow:
  - step: ac-writer
    input: $topic
    produces: ACS.md
    bind: acs

  - step: ac-reviewer
    input: $acs
    produces: gate.json
    bind: gate
    on_fail:
      verdict_field: status
      approve_when: pass
      retry_from: acs
      max_retries: 1
      revise_with:
        prompt: 'Revise the ACs to address the reviewer findings in gate.json.'

  - parallel:
      - step: ac-reviewer
        input: $acs
        produces: review-a.json
        bind: revA
      - step: ac-reviewer
        input: $acs
        produces: review-b.json
        bind: revB
    bind: reviewers
