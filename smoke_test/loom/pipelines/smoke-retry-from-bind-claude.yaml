pipeline: smoke-retry-from-bind-claude
cli: claude
default_extra_args: ['--model', 'haiku']
inputs: [topic]

# Smoke pipeline exercising the v0.1.x retry-from-bind features end-to-end:
#  - bind: on parallel at FlowItem level (identifier for the parallel block)
#  - BindName regex on every bind (implicit; uses identifier-safe names)
#  - on_fail: on step with retry_from to an earlier atomic step in the same scope
#  - approve_when default 'pass', verdict_field 'status', max_retries: 1
#
# Structure (designed within v0.1.x's atomic-only retry-zone constraint):
#  1. ac-writer produces ACS.md      ← retry_from target
#  2. ac-reviewer                    ← gate (on_fail retries from ac-writer)
#  3. parallel block with two reviewers (bind: reviewers — outside retry zone)
#
# v0.1.x limits: retry zones reject compound primitives as target OR as
# intermediate member. So the parallel block sits AFTER the gate, where it's
# never a zone member. The parallel-with-bind exercises schema + emit but
# never enters the retry path.
#
# Expected behavior on the happy path: ac-reviewer emits a verdict whose
# status field equals 'pass', the retry zone converges on first attempt
# (no retry fires), parallel runs both ac-reviewers concurrently. Smoke
# verifies end-to-end wiring of the emit (retryGateZone runtime call,
# let-hoisted bindings, parallel-with-bind mermaid emit) with real CLI
# invocations.

flow:
  - step: ac-writer
    input: $topic
    produces: ACS.md
    bind: acs

  - step: ac-reviewer
    input: $acs
    produces: gate.json
    bind: gate
    on_fail:
      verdict_field: status
      approve_when: pass
      retry_from: acs
      max_retries: 1
      revise_with:
        prompt: 'Revise the ACs to address the reviewer findings in gate.json.'

  - parallel:
      - step: ac-reviewer
        input: $acs
        produces: review-a.json
        bind: revA
      - step: ac-reviewer
        input: $acs
        produces: review-b.json
        bind: revB
    bind: reviewers
