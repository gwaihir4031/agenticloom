# Expected failure: OnFail .strict() rejects 'maxRetries' camelCase typo.
pipeline: unhappy-2-on-fail-strict-typo-copilot
cli: copilot
default_extra_args: ['--model', 'gpt-4.1']
inputs: [topic]
flow:
  - step: ac-writer
    input: $topic
    produces: ACS.md
    bind: acs
  - step: ac-reviewer
    input: $acs
    produces: gate.json
    bind: gate
    on_fail:
      verdict_field: status
      retry_from: acs
      maxRetries: 3
      revise_with:
        prompt: 'Revise per findings.'
