# Expected failure: OnFail schema is .strict(), so 'maxRetries' (camelCase)
# instead of 'max_retries' (snake_case) triggers unrecognized-key rejection.
pipeline: unhappy-2-on-fail-strict-typo-claude
cli: claude
default_extra_args: ['--model', 'haiku']
inputs: [topic]
flow:
  - step: ac-writer
    input: $topic
    produces: ACS.md
    bind: acs
  - step: ac-reviewer
    input: $acs
    produces: gate.json
    bind: gate
    on_fail:
      verdict_field: status
      retry_from: acs
      maxRetries: 3
      revise_with:
        prompt: 'Revise per findings.'
