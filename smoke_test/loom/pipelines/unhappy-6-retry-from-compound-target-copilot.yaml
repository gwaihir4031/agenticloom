# Expected failure: retry_from to a parallel block (compound). v0.1.x rejects.
pipeline: unhappy-6-retry-from-compound-target-copilot
cli: copilot
default_extra_args: ['--model', 'gpt-4.1']
inputs: [topic]
flow:
  - parallel:
      - step: ac-writer
        input: $topic
        produces: ACS.md
        bind: acs
      - step: spec-writer
        input: $topic
        produces: SPEC.md
        bind: spec
    bind: par
  - step: ac-reviewer
    input: $topic
    produces: gate.json
    bind: gate
    on_fail:
      verdict_field: status
      retry_from: par
      revise_with:
        prompt: 'Revise per findings.'
